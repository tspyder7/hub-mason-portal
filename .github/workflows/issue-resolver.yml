name: issue-resolver

on:
  issues:
    types: [opened]

jobs:
  resolve-issue:
    runs-on: ubuntu-latest

    steps:
      # STEP_0: Checkout code
      - name: Checkout Code
        uses: actions/checkout@v5

      # STEP_1: Cache project dependencies
      - name: Cache Project Dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          # Changes the cache anytime your lockfile changes
          key: ${{ runner.os }}-bun-deps-${{ hashFiles('**/bun.lockb', '**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-deps-

      # STEP_2: Setup Bun with Caching
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # STEP_3: Pulls from ~/.bun/install/cache if available
      - name: Install dependencies
        run: bun install

      # STEP_4: Resolve Issue
      - name: Resolve Issue
        run: bun run src/index.ts
